<div class="rounded-[1.25rem] border border-primary-500/10 bg-white/90 p-4 shadow-[0_18px_46px_rgba(19,26,63,0.08)]">
  <div class="mb-3 text-xs font-extrabold uppercase tracking-[0.16em] text-primary-500">Categories</div>

  <div class="flex flex-wrap gap-2 lg:flex-col">
    <button
      type="button"
      class="rounded-xl px-3 py-2 text-left text-sm font-bold transition"
      [ngClass]="
        selectedCategory() === 'all'
          ? 'bg-primary-900 text-white shadow-[0_12px_28px_rgba(19,26,63,0.18)]'
          : 'bg-primary-50 text-primary-900 hover:bg-secondary-100/70'
      "
      (click)="onCategorySelect.emit('all')"
    >
      All <span class="ml-2 text-xs opacity-80">({{ totalCount() }})</span>
    </button>

    @for (c of categories(); track c.slug) {
      <button
        type="button"
        class="rounded-xl px-3 py-2 text-left text-sm font-bold transition"
        [ngClass]="
          selectedCategory() === c.slug
            ? 'bg-primary-900 text-white shadow-[0_12px_28px_rgba(19,26,63,0.18)]'
            : 'bg-primary-50 text-primary-900 hover:bg-secondary-100/70'
        "
        (click)="onCategorySelect.emit(c.slug)"
      >
        {{ c.title }}
        <span class="ml-2 text-xs opacity-80">({{ countBySlug()[c.slug] }})</span>
      </button>
    }
  </div>
</div>
