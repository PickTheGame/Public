<section class="overflow-hidden rounded-[1.25rem] border bg-white/90 shadow-[0_18px_46px_rgba(19,26,63,0.08)] transition"
  [ngClass]="isOpened() ? 'border-secondary-500/60' : 'border-primary-500/10'">
  <button
    type="button"
    class="flex w-full items-start justify-between gap-4 px-5 py-4 text-left transition hover:bg-primary-50/75"
    (click)="isOpened.update(t => !t)"
    [attr.aria-expanded]="isOpened()"
  >
    <div class="min-w-0">
      <div class="text-base font-extrabold leading-6 text-primary-900">
        {{ faq().question }}
      </div>
      <div class="mt-1 text-xs font-bold uppercase tracking-[0.12em] text-primary-500/70">
        {{ faq().pageTitle }}
      </div>
    </div>

    <span
      class="material-icons ml-3 inline-block text-secondary-700 transition-transform duration-200"
      [ngClass]="isOpened() ? 'rotate-180' : 'rotate-0'"
    >
      expand_more
    </span>
  </button>

  <div
    class="grid bg-primary-50/70 transition-[grid-template-rows] duration-200 ease-out"
    [ngClass]="isOpened() ? 'grid-rows-[1fr]' : 'grid-rows-[0fr]'"
  >
    <div class="overflow-hidden">
      <div class="border-t border-primary-500/10 px-5 py-4 prose max-w-none prose-slate prose-a:text-primary-700 prose-strong:text-primary-900 prose-headings:font-display prose-headings:uppercase prose-headings:tracking-[0.02em] prose-headings:text-primary-900">
        <markdown [data]="faq().answerMd"></markdown>
      </div>
    </div>
  </div>
</section>
